<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lobster&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Raleway:ital,wght@0,100..900;1,100..900&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div id="AppContainer">
        <main class="task-app">

            <header class="app-header">
                <h1>Task Manager</h1>
            </header>

            <section id="taskmanager"  class="task-grid">
               
        
                    <section class="task-column" id="highTasks">
                    <h2>High</h2>
                    </section>

                    <section class="task-column" id="mediumTasks">
                    <h2>Medium</h2>
                    </section>

                    <section class="task-column" id="lowTasks">
                    <h2>Low</h2>
                    </section>
         

                <aside class="task-sidebar">
                    <div class="add-task-panel">
                        <h2>Add Your Task</h2>

                        <form id="taskForm">
                            <label for="taskName">Task:</label>
                            <input type="text" id="taskName" placeholder="Add your task">
                            
                            <label for="taskDescription">Description:</label>
                            <textarea id="taskDescription" placeholder="Description"></textarea>

                            <label for="taskPriority">Priority:</label>
                            <select id="taskPriority">
                                <option value="">Priority</option>
                                <option value="High">High</option>
                                <option value="Medium">Medium</option>
                                <option value="Low">Low</option>
                            </select>
                            <div class="checkbox-group">
                                <label for="importantTask">
                                    <input type="checkbox" id="importantTask">
                                    Important
                                </label>

                                <label for="completedTask">
                                    <input  type="checkbox" id="completedTask">
                                    Completed
                                </label>
                            </div>

                            <button type="submit">Add Task</button>

                              
                        </form>
                   
                    </div>
                    <div class="completed-task-panel" id="completedTasks">
                        <h2>Completed Task</h2>
                    </div>
                </aside>
            

            </section>

        </main>
    </div>
</body>
</html>
