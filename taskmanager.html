<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div id="taskmanager">
        <main class="task-app">

            <header class="app-header">
                <h1>Task Manager</h1>
            </header>

            <section  class="task-grid">

                <section class="task-column" id="highTasks">
                  <h2>High</h2>
                </section>

                <section class="task-column" id="mediumTasks">
                  <h2>Medium</h2>
                </section>

                <section class="task-column" id="lowTasks">
                  <h2>Low</h2>
                </section>

                <aside class="task-sidebar">
                    <div class="add-task-panel">
                        <h2>Add Your Task</h2>

                        <form id="taskForm">
                            <label for="taskName">Task:</label>
                            <input type="text" id="taskName" placeholder="Add your task">
                            
                            <label for="taskDescription">Description:</label>
                            <textarea id="taskDescription" placeholder="Description"></textarea>

                            <label for="taskPriority">Priority:</label>
                            <select id="taskPriority">
                                <option value="">Priority</option>
                                <option value="High">High</option>
                                <option value="Medium">Medium</option>
                                <option value="Low">Low</option>
                            </select>

                            <label for="importantTask">
                                <input type="checkbox" id="importantTask">
                                Important
                            </label>

                            <label for="completedTask">
                                <input type="checkbox" id="completedTask">
                                Completed
                            </label>

                            <button type="submit">Add Task</button>
                        </form>
                    </div>

                    <div class="completed-task-panel" id="completedTasks">
                        <h2>Completed Task</h2>
                    </div>
                </aside>

            </section>

        </main>
    </div>
</body>
</html>
